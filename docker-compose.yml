# docker-compose.yml — Vibe Appliance core stack.
#
# Services:
#   caddy     — TLS terminator + reverse proxy. Only service that publishes
#               ports to the host (80 + 443).
#   postgres  — Shared database. Per-app databases live inside this one
#               instance (created by lib/db-bootstrap.sh in Phase 3).
#   redis     — Shared cache. Same idea: one instance, multiple logical
#               databases per app.
#   console   — Vibe Appliance management UI. Reads /opt/vibe/data &
#               /opt/vibe/env. Talks to the docker daemon via /var/run/
#               docker.sock for container-health reporting in the admin
#               status panel.
#
# Network: vibe_net (internal). Apps added in Phase 3+ join this network
# so Caddy can reverse-proxy them by service name.
#
# All paths under /opt/vibe/data and /opt/vibe/env are bind-mounted from
# the host so a `tar czf vibe.tgz /opt/vibe/data /opt/vibe/env` migration
# is straightforward.

name: vibe

networks:
  vibe_net:
    name: vibe_net
    driver: bridge

services:
  caddy:
    # Official upstream image — no custom build. Domain mode uses HTTP-01
    # for cert issuance (port 80 must be inbound-reachable from the
    # internet during issuance/renewal). Operators who need DNS-01
    # wildcard certs (e.g. firewalled :80) can opt into a custom build
    # via caddy/Dockerfile.cloudflare; see that file's header for steps.
    image: caddy:2-alpine
    container_name: vibe-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    env_file:
      # shared.env is mounted so the OPTIONAL Cloudflare DNS-01 build
      # path (caddy/Dockerfile.cloudflare) can read CLOUDFLARE_API_TOKEN
      # at runtime. The default image ignores it.
      - /opt/vibe/env/shared.env
    volumes:
      - /opt/vibe/data/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/vibe/data/caddy/data:/data
      - /opt/vibe/data/caddy/config:/config
    networks:
      - vibe_net
    depends_on:
      console:
        condition: service_healthy
    extra_hosts:
      # Cockpit lives on the host (apt install — see infra/cockpit-
      # install.sh). render-caddyfile.sh emits a reverse_proxy to
      # `host.docker.internal:9090` for the cockpit.<domain> vhost in
      # domain mode. Without this entry Caddy can't resolve the
      # hostname inside the container and the cockpit subdomain
      # returns 502.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # `caddy version` exits 0 when the binary is intact; useful as a
      # liveness probe without depending on the config being valid.
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: vibe-postgres
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
    volumes:
      - /opt/vibe/data/postgres:/var/lib/postgresql/data
    networks:
      - vibe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
    # Wrap redis-server in `sh -c` so we can reference $REDIS_PASSWORD.
    # The literal `$$` in compose escapes one level of variable expansion
    # so the env var is resolved by the shell inside the container, not
    # by docker-compose at parse time.
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes --dir /data"]
    volumes:
      - /opt/vibe/data/redis:/data
    networks:
      - vibe_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  console:
    build:
      context: ./console
      dockerfile: Dockerfile
    image: vibe-appliance/console:latest
    container_name: vibe-console
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
    environment:
      VIBE_DIR: /opt/vibe
      NODE_ENV: production
    volumes:
      # The whole /opt/vibe tree is mounted as a directory — not as
      # individual file bind mounts. Why: bootstrap.sh writes state.json
      # via atomic rename (write-tmp + rename-into-place), which changes
      # the inode. A file-level bind mount would freeze the container on
      # the original inode and never see updates. A directory mount
      # re-resolves the path on every open(), so the container always
      # sees the latest state.
      #
      # Mount mode is rw, but the protection is filesystem permissions:
      # CREDENTIALS.txt and env/shared.env are mode 600 root-owned, so
      # the console (running as a non-root container user) can't read
      # them. shared.env values reach the container via env_file, not
      # via this mount.
      - /opt/vibe:/opt/vibe
      # Docker socket — read by dockerode for container health and
      # `docker info` in the admin Status panel.
      # NOTE: even read-only, the socket effectively grants
      # root-equivalent host access. The console is treated as a trusted
      # privileged service. Phase 4 may swap this for a
      # docker-socket-proxy if we tighten the security model.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vibe_net
    healthcheck:
      # Use Node's built-in HTTP module so we don't need to add wget/curl
      # to the image. Exits 0 only on a 200 response.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    extra_hosts:
      # Lets the console (and via the network, Caddy) reach Cockpit on
      # the host without depending on a specific docker-bridge IP.
      # `host-gateway` resolves to the host from inside containers on
      # Linux ≥ 20.10.
      - "host.docker.internal:host-gateway"

  duplicati:
    # Self-hosted backup. Per-backup AES-256 encryption is configured
    # in Duplicati's UI when the operator sets up a backup job — the
    # passphrase the appliance generates lives in CREDENTIALS.txt and
    # is the operator's to type into the form. The destination is
    # deliberately left blank: PLAN.md §7's "automated source, manual
    # destination" rule.
    image: lscr.io/linuxserver/duplicati:latest
    container_name: vibe-duplicati
    restart: unless-stopped
    environment:
      PUID: "0"
      PGID: "0"
      TZ: "Etc/UTC"
    volumes:
      - /opt/vibe/data/duplicati:/config
      # Backup sources — read-only so a misclick in the UI can't
      # rewrite the appliance's data tree.
      - /opt/vibe/data:/source/vibe-data:ro
      - /opt/vibe/env:/source/vibe-env:ro
    networks:
      - vibe_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8200 >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 30s

  portainer:
    # Lightweight container UI; admin password is set on first visit
    # and stored in /opt/vibe/data/portainer. We don't pre-seed it so
    # the operator goes through Portainer's normal first-run UX.
    image: portainer/portainer-ce:lts
    container_name: vibe-portainer
    restart: unless-stopped
    volumes:
      - /opt/vibe/data/portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vibe_net
    # No healthcheck: the official portainer-ce image doesn't include
    # wget/curl/etc., and Portainer's HTTP listener boots in <5 s on
    # any reasonable host. Caddy's reverse-proxy probe is sufficient.
