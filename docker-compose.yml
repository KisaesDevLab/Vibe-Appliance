# docker-compose.yml — Vibe Appliance core stack.
#
# Services:
#   caddy     — TLS terminator + reverse proxy. Only service that publishes
#               ports to the host (80 + 443).
#   postgres  — Shared database. Per-app databases live inside this one
#               instance (created by lib/db-bootstrap.sh in Phase 3).
#   redis     — Shared cache. Same idea: one instance, multiple logical
#               databases per app.
#   console   — Vibe Appliance management UI. Reads /opt/vibe/data &
#               /opt/vibe/env. Talks to the docker daemon via /var/run/
#               docker.sock for container-health reporting in the admin
#               status panel.
#
# Network: vibe_net (internal). Apps added in Phase 3+ join this network
# so Caddy can reverse-proxy them by service name.
#
# All paths under /opt/vibe/data and /opt/vibe/env are bind-mounted from
# the host so a `tar czf vibe.tgz /opt/vibe/data /opt/vibe/env` migration
# is straightforward.

name: vibe

networks:
  vibe_net:
    name: vibe_net
    driver: bridge

services:
  caddy:
    # Official upstream image — no custom build. Domain mode uses HTTP-01
    # for cert issuance (port 80 must be inbound-reachable from the
    # internet during issuance/renewal). Operators who need DNS-01
    # wildcard certs (e.g. firewalled :80) can opt into a custom build
    # via caddy/Dockerfile.cloudflare; see that file's header for steps.
    image: caddy:2-alpine
    container_name: vibe-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    env_file:
      # shared.env is mounted so the OPTIONAL Cloudflare DNS-01 build
      # path (caddy/Dockerfile.cloudflare) can read CLOUDFLARE_API_TOKEN
      # at runtime. The default image ignores it.
      - /opt/vibe/env/shared.env
      # Phase 8.5 v1.2 — appliance.env also mounted so the Settings
      # page's CLOUDFLARE_API_TOKEN write (admin Settings → Network)
      # reaches Caddy without needing a re-bootstrap.
      #
      # Override semantics: docker-compose merges env_file entries in
      # declaration order. For the same key in both files, the LATER
      # file (appliance.env, declared second) wins. So Settings-page
      # writes consistently override values from `bootstrap.sh
      # --cloudflare-api-token` (which targets shared.env).
      #
      # File-existence: bootstrap's phase_secrets renders appliance.env
      # before phase_core_up brings up Caddy, so the file always
      # exists by container-start time. On a re-bootstrap that fails
      # mid-secrets (rare), the file might be missing and compose
      # would error "env file not found". Recovery: re-run
      # `sudo /opt/vibe/appliance/bootstrap.sh` (idempotent — picks
      # up at the failed phase) which calls secrets_render_appliance
      # and creates the file.
      - /opt/vibe/env/appliance.env
    volumes:
      # Mount the PARENT directory, not the Caddyfile itself. Caddyfile
      # is rewritten via atomic rename (lib/render-caddyfile.sh) on
      # every app enable/disable, which changes its inode. A file-level
      # bind mount would freeze the container on the original inode and
      # `caddy reload` would silently re-read the stale file — every
      # newly-enabled app would 404 with the catch-all serving from the
      # console. A directory mount re-resolves on every open() so
      # reload always sees the latest Caddyfile. The .bak.* files and
      # data/config subdirs that also live under /opt/vibe/data/caddy
      # show up at /etc/caddy/{Caddyfile.bak.*, data, config}; Caddy
      # doesn't read them and the actual writable Caddy dirs are
      # mounted separately at /data and /config below.
      - /opt/vibe/data/caddy:/etc/caddy:ro
      - /opt/vibe/data/caddy/data:/data
      - /opt/vibe/data/caddy/config:/config
    networks:
      - vibe_net
    depends_on:
      console:
        condition: service_healthy
    extra_hosts:
      # Cockpit lives on the host (apt install — see infra/cockpit-
      # install.sh). render-caddyfile.sh emits a reverse_proxy to
      # `host.docker.internal:9090` for the cockpit.<domain> vhost in
      # domain mode. Without this entry Caddy can't resolve the
      # hostname inside the container and the cockpit subdomain
      # returns 502.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # `caddy version` exits 0 when the binary is intact; useful as a
      # liveness probe without depending on the config being valid.
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    # ParadeDB is the appliance's shared Postgres image, per
    # docs/PLAN.md and the vibe-tax-research-chat-compatibility-addendum
    # §5.2: it ships pgvector (HNSW vector indexes) AND pg_search
    # (BM25/ParadeDB extension) on top of stock Postgres 16, so apps
    # that need hybrid retrieval (Tax-Research-Chat today, possibly
    # other apps later) "just work" against the shared cluster
    # without per-app Postgres deployments.
    #
    # The `-pg16` tag is binary-compatible with vanilla `postgres:16`
    # — same PG16 series, same on-disk PGDATA layout — so existing
    # /opt/vibe/data/postgres volumes from `postgres:16-alpine` mount
    # in place. The image goes from alpine/musl to debian/glibc, so
    # text-collation ordering may differ for indexes built on the old
    # image. After the first restart on the new image, run
    # `REINDEX DATABASE <each-vibe-db>` from psql if you observe odd
    # ordering on text columns. New installs aren't affected.
    #
    # Pin to an explicit version (not :latest) so a ParadeDB upstream
    # bump never surprise-changes the appliance's Postgres behavior.
    # Bumping is a deliberate update.sh path.
    image: paradedb/paradedb:0.23.2-pg16
    container_name: vibe-postgres
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
    volumes:
      - /opt/vibe/data/postgres:/var/lib/postgresql/data
    networks:
      - vibe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
    # Wrap redis-server in `sh -c` so we can reference $REDIS_PASSWORD.
    # The literal `$$` in compose escapes one level of variable expansion
    # so the env var is resolved by the shell inside the container, not
    # by docker-compose at parse time.
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes --dir /data"]
    volumes:
      - /opt/vibe/data/redis:/data
    networks:
      - vibe_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  console:
    build:
      context: ./console
      dockerfile: Dockerfile
    image: vibe-appliance/console:latest
    container_name: vibe-console
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
    environment:
      VIBE_DIR: /opt/vibe
      NODE_ENV: production
    volumes:
      # The whole /opt/vibe tree is mounted as a directory — not as
      # individual file bind mounts. Why: bootstrap.sh writes state.json
      # via atomic rename (write-tmp + rename-into-place), which changes
      # the inode. A file-level bind mount would freeze the container on
      # the original inode and never see updates. A directory mount
      # re-resolves the path on every open(), so the container always
      # sees the latest state.
      #
      # Mount mode is rw, but the protection is filesystem permissions:
      # CREDENTIALS.txt and env/shared.env are mode 600 root-owned, so
      # the console (running as a non-root container user) can't read
      # them. shared.env values reach the container via env_file, not
      # via this mount.
      - /opt/vibe:/opt/vibe
      # Docker socket — read by dockerode for container health and
      # `docker info` in the admin Status panel.
      # NOTE: even read-only, the socket effectively grants
      # root-equivalent host access. The console is treated as a trusted
      # privileged service. Phase 4 may swap this for a
      # docker-socket-proxy if we tighten the security model.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vibe_net
    healthcheck:
      # Use Node's built-in HTTP module so we don't need to add wget/curl
      # to the image. Exits 0 only on a 200 response.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    extra_hosts:
      # Lets the console (and via the network, Caddy) reach Cockpit on
      # the host without depending on a specific docker-bridge IP.
      # `host-gateway` resolves to the host from inside containers on
      # Linux ≥ 20.10.
      - "host.docker.internal:host-gateway"

  duplicati:
    # Self-hosted backup. Per-backup AES-256 encryption is configured
    # in Duplicati's UI when the operator sets up a backup job — the
    # passphrase the appliance generates lives in CREDENTIALS.txt and
    # is the operator's to type into the form. The destination is
    # deliberately left blank: PLAN.md §7's "automated source, manual
    # destination" rule.
    #
    # SETTINGS_ENCRYPTION_KEY is required since Duplicati 2.1
    # (linuxserver image v2.3+). Without it the container starts but
    # refuses to bring up its web service ("Missing encryption key,
    # unable to encrypt your settings database"). The key lives in
    # /opt/vibe/env/shared.env and is mounted via env_file below.
    image: lscr.io/linuxserver/duplicati:latest
    container_name: vibe-duplicati
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
    environment:
      PUID: "0"
      PGID: "0"
      TZ: "Etc/UTC"
    volumes:
      - /opt/vibe/data/duplicati:/config
      # Backup sources — read-only so a misclick in the UI can't
      # rewrite the appliance's data tree.
      - /opt/vibe/data:/source/vibe-data:ro
      - /opt/vibe/env:/source/vibe-env:ro
    networks:
      - vibe_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8200 >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 30s

  portainer:
    # Lightweight container UI. Admin password is pre-seeded by
    # lib/secrets.sh's secrets_seed_portainer_password — the plain
    # value lives in shared.env (PORTAINER_ADMIN_PASSWORD), is surfaced
    # in /opt/vibe/CREDENTIALS.txt and the admin First-login info card,
    # and is written verbatim (plain, NOT bcrypt-hashed — see the long
    # comment in lib/secrets.sh) to /opt/vibe/data/portainer/.admin-pw
    # (mode 600). Portainer reads it via --admin-password-file and
    # hashes it itself. The flag only takes effect if no admin user
    # exists yet — for established installs the operator's manually-set
    # password keeps working.
    image: portainer/portainer-ce:lts
    container_name: vibe-portainer
    restart: unless-stopped
    command:
      - "--admin-password-file=/data/.admin-pw"
    volumes:
      - /opt/vibe/data/portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vibe_net
    # No healthcheck: the official portainer-ce image doesn't include
    # wget/curl/etc., and Portainer's HTTP listener boots in <5 s on
    # any reasonable host. Caddy's reverse-proxy probe is sufficient.

  emergency-proxy:
    # Phase 8.5 Workstream D — second, independent reverse proxy that
    # gives staff a working access path when the primary domain routing
    # is broken. Plain HTTP, no ACME, deliberately decoupled from Caddy.
    # Config is rendered by lib/render-haproxy.sh from manifest
    # emergencyPort fields. UFW (lib/ufw-rules.sh) gates these ports to
    # RFC1918 + Tailscale CGNAT only — they MUST NEVER be reachable from
    # the public internet.
    #
    # `depends_on: []` is deliberate: emergency-proxy must come up even
    # if Caddy or any app is broken, and must keep running if they
    # crash. That's the whole point.
    image: haproxy:2.9-alpine
    container_name: vibe-emergency-proxy
    restart: unless-stopped
    ports:
      - "5171:5171"
      - "5172:5172"
      - "5181:5181"
      - "5182:5182"
      - "5191:5191"
      - "5192:5192"
      # Phase 8.5 v1.2 — fallback ports for infra services. Same UFW
      # gating, same rate-limit + custom 503 — Duplicati / Portainer
      # become reachable when Caddy / DNS / certs are broken.
      - "5197:5197"
      - "5198:5198"
      # Stats UI on loopback only — SSH-tunnel for diagnostics, never
      # exposed off-host. See docs/addenda/emergency-access.md §4.1.
      - "127.0.0.1:5199:5199"
    volumes:
      - /opt/vibe/data/emergency-proxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - /opt/vibe/data/emergency-proxy/503.http:/usr/local/etc/haproxy/503.http:ro
    networks:
      - vibe_net
    depends_on: []
    healthcheck:
      # `haproxy -c -f` exits 0 when the config parses; useful liveness
      # probe without reaching out for socat or other extras. The image
      # is busybox-ish but ships sh.
      test: ["CMD-SHELL", "haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 10s
