<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client portal</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">Client portal</p>
      <h1 id="hero-title">Client portal</h1>
      <p class="muted">
        Welcome. Use the cards below to reach the tools your firm has shared with you.
        If your account manager sent you a sign-in link, you can also go directly to it.
      </p>
    </header>

    <section id="apps-section" aria-busy="true">
      <div class="card"><h3>Loading…</h3><p class="muted">fetching client tools…</p></div>
    </section>

    <footer class="footer">
      <div id="staff-signin" class="cta-row" style="margin-top: 1rem; display: none;">
        <a class="btn btn--ghost" href="/admin">Staff sign-in</a>
      </div>
    </footer>
  </main>

  <script>
    // Render the apps the firm has chosen to expose to clients. Filter
    // is server-side (enabled && visibleToCustomers). Page is public —
    // no auth, no sensitive fields in the payload.

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function renderEmpty() {
      return `
        <div class="empty-state">
          <h2>Nothing to show yet.</h2>
          <p class="muted">
            Your firm hasn't shared any apps to this page yet. If you were
            expecting to see something, contact your account manager.
          </p>
        </div>`;
    }

    function renderError(msg) {
      return `
        <div class="empty-state">
          <h2>Couldn't load apps.</h2>
          <p class="muted">${escapeHtml(msg)}</p>
        </div>`;
    }

    function renderTiles(apps, customCards) {
      const appTiles = apps.map((a) => renderCard({
        title: a.displayName,
        description: a.description,
        actions: renderActions(a),
      }));
      const customTiles = customCards.map((c) => renderCard({
        title: c.title,
        description: c.description,
        actions: `<a class="btn" href="${escapeHtml(c.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(c.buttonLabel || 'Open')}</a>`,
      }));
      return `<div class="client-grid">${[...appTiles, ...customTiles].join('')}</div>`;
    }

    function renderCard({ title, description, actions }) {
      return `
        <article class="app-card">
          <header class="app-card__head">
            <h3 class="app-card__title">${escapeHtml(title)}</h3>
          </header>
          <p class="app-card__desc">${escapeHtml(description || '')}</p>
          <div class="app-card__actions">${actions}</div>
        </article>`;
    }

    // One button per clientLanding entry when the manifest declares
    // them, otherwise a single "Open" button. Both arms target _blank
    // with noopener — clients may have the staff console open in the
    // same browser, and a same-tab navigation would lose that session.
    function renderActions(a) {
      const entries = Array.isArray(a.clientLanding) ? a.clientLanding : [];
      if (entries.length) {
        return entries.map((e) =>
          `<a class="btn" href="${escapeHtml(e.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(e.label)}</a>`
        ).join(' ');
      }
      return `<a class="btn" href="${escapeHtml(a.url)}" target="_blank" rel="noopener noreferrer">Open</a>`;
    }

    function applyFirmName(firmName) {
      if (!firmName) return;
      const title = document.getElementById('hero-title');
      if (title) title.textContent = `${firmName} · Client portal`;
      document.title = `${firmName} · Client portal`;
    }

    // Staff sign-in link is hidden by default and only revealed when the
    // server reports the toggle on. Hiding by default avoids a flash of
    // the link before the fetch resolves on operators who have it off.
    function applyStaffSignin(show) {
      const el = document.getElementById('staff-signin');
      if (el && show) el.style.display = '';
    }

    async function loadApps() {
      const section = document.getElementById('apps-section');
      try {
        const r = await fetch('/api/v1/public/apps', { credentials: 'omit' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        applyFirmName(data.firmName);
        applyStaffSignin(data.showStaffSignin !== false);
        const apps = Array.isArray(data.apps) ? data.apps : [];
        const customCards = Array.isArray(data.customCards) ? data.customCards : [];
        section.innerHTML = (apps.length || customCards.length)
          ? renderTiles(apps, customCards)
          : renderEmpty();
      } catch (err) {
        section.innerHTML = renderError(err.message || String(err));
      } finally {
        section.removeAttribute('aria-busy');
      }
    }

    loadApps();
  </script>
</body>
</html>
