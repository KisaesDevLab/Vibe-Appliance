<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vibe Appliance</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">Vibe Appliance</p>
      <h1>Your firm's stack, one box.</h1>
    </header>

    <section id="apps-section" aria-busy="true">
      <div class="card"><h3>Loading…</h3><p class="muted">fetching enabled apps…</p></div>
    </section>

    <footer class="footer">
      <p>
        Need help? Open the admin console for status, diagnostics, and the
        per-app first-login info. The admin password was printed during
        installation and is also in <span class="mono">/opt/vibe/CREDENTIALS.txt</span> on the server.
      </p>
      <div class="cta-row" style="margin-top: 1rem;">
        <a class="btn btn--ghost" href="/admin">Admin console</a>
      </div>
    </footer>
  </main>

  <script>
    // Render enabled apps from /api/v1/public/apps. The endpoint exposes
    // only slug/displayName/description/url for ENABLED apps; nothing
    // sensitive ever lands in the public DOM.

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function renderEmpty() {
      return `
        <div class="empty-state">
          <h2>No apps enabled yet.</h2>
          <p class="muted">
            The administrator hasn't switched any apps on. Once they do,
            each enabled app will appear here as a card with an Open button.
          </p>
          <div class="cta-row">
            <a class="btn" href="/admin">Go to admin console</a>
          </div>
        </div>`;
    }

    function renderError(msg) {
      return `
        <div class="empty-state">
          <h2>Couldn't load apps.</h2>
          <p class="muted">${escapeHtml(msg)}</p>
          <div class="cta-row">
            <a class="btn btn--ghost" href="/admin">Go to admin console</a>
          </div>
        </div>`;
    }

    function renderApps(apps) {
      const cards = apps.map((a) => {
        // Primary URL row — always present, clickable when http(s).
        const primaryUrl = a.url && a.url.startsWith('http')
          ? `<a href="${escapeHtml(a.url)}">${escapeHtml(a.url)}</a>`
          : `<span class="muted">${escapeHtml(a.url || '—')}</span>`;

        // Emergency / backup URL row — shown only when the appliance
        // has both a manifest emergencyPort AND a cached host_ip. Plain
        // HTTP on the LAN; the proxy is UFW-gated to RFC1918 + tailnet.
        const emergencyRow = a.emergencyUrl ? `
          <dt>backup</dt>
          <dd><a href="${escapeHtml(a.emergencyUrl)}">${escapeHtml(a.emergencyUrl)}</a>
            <span class="muted">(LAN/Tailscale only)</span></dd>` : '';

        // Default admin username — surfaced so end users see what
        // account to log in with. Password is deliberately NOT shown
        // here; operators get it via /admin only.
        const userRow = a.username ? `
          <dt>username</dt>
          <dd><span class="mono">${escapeHtml(a.username)}</span></dd>` : '';

        return `
        <article class="app-card">
          <header class="app-card__head">
            <h3 class="app-card__title">${escapeHtml(a.displayName)}</h3>
          </header>
          <p class="app-card__desc">${escapeHtml(a.description)}</p>
          <dl class="kv app-card__kv">
            <dt>primary</dt><dd>${primaryUrl}</dd>
            ${emergencyRow}
            ${userRow}
          </dl>
          <div class="app-card__actions">
            <a class="btn" href="${escapeHtml(a.url)}" target="_blank" rel="noopener noreferrer">Open</a>
          </div>
        </article>`;
      }).join('');
      return `<div class="admin-grid">${cards}</div>`;
    }

    async function loadApps() {
      const section = document.getElementById('apps-section');
      try {
        const r = await fetch('/api/v1/public/apps', { credentials: 'omit' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const apps = Array.isArray(data.apps) ? data.apps : [];
        section.innerHTML = apps.length ? renderApps(apps) : renderEmpty();
      } catch (err) {
        section.innerHTML = renderError(err.message || String(err));
      } finally {
        section.removeAttribute('aria-busy');
      }
    }

    loadApps();
  </script>
</body>
</html>
