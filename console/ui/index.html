<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client portal</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">Client portal</p>
      <h1 id="hero-title">Client portal</h1>
      <p class="muted">
        Welcome. Use the cards below to reach the tools your firm has shared with you.
        If your account manager sent you a sign-in link, you can also go directly to it.
      </p>
    </header>

    <section id="apps-section" aria-busy="true">
      <div class="card"><h3>Loading…</h3><p class="muted">fetching client tools…</p></div>
    </section>

    <footer class="footer">
      <div class="cta-row" style="margin-top: 1rem;">
        <a class="btn btn--ghost" href="/admin">Staff sign-in</a>
      </div>
    </footer>
  </main>

  <script>
    // Render the apps the firm has chosen to expose to clients. Filter
    // is server-side (enabled && visibleToCustomers). Page is public —
    // no auth, no sensitive fields in the payload.

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function renderEmpty() {
      return `
        <div class="empty-state">
          <h2>Nothing to show yet.</h2>
          <p class="muted">
            Your firm hasn't shared any apps to this page yet. If you were
            expecting to see something, contact your account manager.
          </p>
        </div>`;
    }

    function renderError(msg) {
      return `
        <div class="empty-state">
          <h2>Couldn't load apps.</h2>
          <p class="muted">${escapeHtml(msg)}</p>
        </div>`;
    }

    function renderApps(apps) {
      const cards = apps.map((a) => {
        // Primary URL row — always present, clickable when http(s).
        const primaryUrl = a.url && a.url.startsWith('http')
          ? `<a href="${escapeHtml(a.url)}">${escapeHtml(a.url)}</a>`
          : `<span class="muted">${escapeHtml(a.url || '—')}</span>`;

        // Alternative-access rows. Each is gated server-side by an
        // admin toggle (Configuration → Landing page) plus the URL
        // being actually available. Server only includes the field
        // when both gates pass, so we render whatever's present.
        const fallbackRow = a.lanFallbackUrl ? `
          <dt>backup</dt>
          <dd><a href="${escapeHtml(a.lanFallbackUrl)}">${escapeHtml(a.lanFallbackUrl)}</a>
            <span class="muted">(LAN-only)</span></dd>` : '';
        const tailnetIpRow = a.tailnetUrl ? `
          <dt>tailnet</dt>
          <dd><a href="${escapeHtml(a.tailnetUrl)}">${escapeHtml(a.tailnetUrl)}</a>
            <span class="muted">(via Tailscale IP)</span></dd>` : '';
        const tailnetHttpsRow = a.tailnetHostnameUrl ? `
          <dt>tailnet (HTTPS)</dt>
          <dd><a href="${escapeHtml(a.tailnetHostnameUrl)}">${escapeHtml(a.tailnetHostnameUrl)}</a>
            <span class="muted">(via Tailscale Serve)</span></dd>` : '';

        return `
        <article class="app-card">
          <header class="app-card__head">
            <h3 class="app-card__title">${escapeHtml(a.displayName)}</h3>
          </header>
          <p class="app-card__desc">${escapeHtml(a.description)}</p>
          <dl class="kv app-card__kv">
            <dt>primary</dt><dd>${primaryUrl}</dd>
            ${fallbackRow}
            ${tailnetIpRow}
            ${tailnetHttpsRow}
          </dl>
          <div class="app-card__actions">
            <a class="btn" href="${escapeHtml(a.url)}" target="_blank" rel="noopener noreferrer">Open</a>
          </div>
        </article>`;
      }).join('');
      return `<div class="admin-grid">${cards}</div>`;
    }

    function applyFirmName(firmName) {
      if (!firmName) return;
      const title = document.getElementById('hero-title');
      if (title) title.textContent = `${firmName} · Client portal`;
      document.title = `${firmName} · Client portal`;
    }

    async function loadApps() {
      const section = document.getElementById('apps-section');
      try {
        const r = await fetch('/api/v1/public/apps', { credentials: 'omit' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        applyFirmName(data.firmName);
        const apps = Array.isArray(data.apps) ? data.apps : [];
        section.innerHTML = apps.length ? renderApps(apps) : renderEmpty();
      } catch (err) {
        section.innerHTML = renderError(err.message || String(err));
      } finally {
        section.removeAttribute('aria-busy');
      }
    }

    loadApps();
  </script>
</body>
</html>
