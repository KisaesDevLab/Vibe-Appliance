# apps/vibe-payroll.yml — Vibe Payroll & Time overlay.
# Same pattern as Vibe-MyBooks; two-tier with explicit migrations.

name: vibe

services:
  vibe-payroll-server:
    image: ghcr.io/kisaesdevlab/vibe-payroll-server:${APP_TAG:-latest}
    container_name: vibe-payroll-server
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-payroll.env
    networks:
      - vibe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-payroll-client:
    image: ghcr.io/kisaesdevlab/vibe-payroll-client:${APP_TAG:-latest}
    container_name: vibe-payroll-client
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-payroll.env
    networks:
      - vibe_net
    depends_on:
      vibe-payroll-server:
        condition: service_healthy
