# apps/vibe-payroll.yml — Vibe Payroll & Time overlay.
#
# Image refs and ports lifted from KisaesDevLab/Vibe-Payroll-Time's
# prod compose. api listens on BACKEND_PORT=4000 with health at
# /api/v1/health; web is nginx on :80. Vibe-Payroll's CORS env is
# named CORS_ORIGIN (not ALLOWED_ORIGIN) — both are set in the
# rendered env so either name works.

name: vibe

services:
  vibe-payroll-api:
    image: ghcr.io/kisaesdevlab/vibe-payroll-api:${APP_TAG:-latest}
    container_name: vibe-payroll-api
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/appliance.env
      - /opt/vibe/env/vibe-payroll.env
    volumes:
      # Payroll exports — CSV files reference rows by relative path; if
      # not persisted, every container recreate orphans past exports
      # and breaks re-download from the export-history UI.
      - /opt/vibe/data/apps/vibe-payroll/exports:/app/exports
    networks:
      - vibe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-payroll-web:
    image: ghcr.io/kisaesdevlab/vibe-payroll-web:${APP_TAG:-latest}
    container_name: vibe-payroll-web
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/appliance.env
      - /opt/vibe/env/vibe-payroll.env
    networks:
      - vibe_net
    depends_on:
      vibe-payroll-api:
        condition: service_healthy
