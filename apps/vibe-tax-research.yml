# apps/vibe-tax-research.yml — Vibe Tax Research Chat overlay.
#
# Image refs and ports lifted from KisaesDevLab/Vibe-Tax-Research-Chat's
# prod compose. api listens on 4000 with health at /api/health; web is
# nginx serving the SPA on :80. The /chat/* matcher in the manifest is
# streaming (SSE) — Caddy emits flush_interval -1 + 3600s read_timeout
# for that path.

name: vibe

services:
  vibe-tax-research-api:
    image: ghcr.io/kisaesdevlab/vibe-tax-api:${APP_TAG:-latest}
    container_name: vibe-tax-research-api
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-tax-research.env
    networks:
      - vibe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-tax-research-web:
    image: ghcr.io/kisaesdevlab/vibe-tax-web:${APP_TAG:-latest}
    container_name: vibe-tax-research-web
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-tax-research.env
    networks:
      - vibe_net
    depends_on:
      vibe-tax-research-api:
        condition: service_healthy
