# apps/vibe-mybooks.yml — Vibe MyBooks overlay.
#
# Same per-app-network pattern as vibe-tb: the web tier's baked-in
# nginx config has `proxy_pass http://api:3001` and refuses to start
# if `api` doesn't resolve. Per-app private network gives the api
# tier an `api` alias without collision.

name: vibe

services:
  vibe-mybooks-api:
    image: ghcr.io/kisaesdevlab/vibe-mybooks-api:${APP_TAG:-latest}
    container_name: vibe-mybooks-api
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-mybooks.env
    networks:
      vibe_net: {}
      vibe-mybooks-internal:
        aliases: [api]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Vibe-MyBooks's api responds at /health (not /api/v1/health) on 3001.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-mybooks-web:
    image: ghcr.io/kisaesdevlab/vibe-mybooks-web:${APP_TAG:-latest}
    container_name: vibe-mybooks-web
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-mybooks.env
    networks:
      vibe_net: {}
      vibe-mybooks-internal: {}
    depends_on:
      vibe-mybooks-api:
        condition: service_healthy

networks:
  vibe-mybooks-internal:
    name: vibe-mybooks-internal
    driver: bridge
