# apps/vibe-mybooks.yml — Vibe MyBooks overlay.
#
# Image refs and ports lifted from KisaesDevLab/Vibe-MyBooks's prod
# compose. Service names use upstream's `api` / `web` suffix to keep
# this overlay readable next to the published images.

name: vibe

services:
  vibe-mybooks-api:
    image: ghcr.io/kisaesdevlab/vibe-mybooks-api:${APP_TAG:-latest}
    container_name: vibe-mybooks-api
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-mybooks.env
    networks:
      - vibe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Vibe-MyBooks's api responds at /health (not /api/v1/health) on 3001.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-mybooks-web:
    image: ghcr.io/kisaesdevlab/vibe-mybooks-web:${APP_TAG:-latest}
    container_name: vibe-mybooks-web
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-mybooks.env
    networks:
      - vibe_net
    depends_on:
      vibe-mybooks-api:
        condition: service_healthy
