# apps/_pending/vibe-connect.yml — staged, not active.
#
# enable-app.sh looks for apps/<slug>.yml at the top level, so this
# file is parked here until the upstream Vibe-Connect license PR
# merges. Move it up one directory once Connect is ELv2-licensed and
# the appliance picks it up automatically.
#
# Same shape as apps/vibe-mybooks.yml.

name: vibe

services:
  vibe-connect-server:
    image: ghcr.io/kisaesdevlab/vibe-connect-server:${APP_TAG:-latest}
    container_name: vibe-connect-server
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-connect.env
    networks:
      - vibe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-connect-client:
    image: ghcr.io/kisaesdevlab/vibe-connect-client:${APP_TAG:-latest}
    container_name: vibe-connect-client
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-connect.env
    networks:
      - vibe_net
    depends_on:
      vibe-connect-server:
        condition: service_healthy
