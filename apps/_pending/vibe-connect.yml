# apps/_pending/vibe-connect.yml — staged.
#
# enable-app.sh looks for apps/<slug>.yml at the top level, so this file
# is parked here until the GHCR rename + visibility flip lands. Move it
# up one directory once vibe-connect-{server,client}:latest is publicly
# pullable.
#
# Vibe-Connect's vibe-connect-client (nginx) hardcodes its upstream as
# `http://app:4000` (see infra/docker/nginx/nginx.conf.template upstream).
# We satisfy that via a per-app internal network (vibe-connect-internal)
# where vibe-connect-server carries the `app` alias — same pattern used
# by vibe-tb / vibe-mybooks (where the alias is `api`).

name: vibe

services:
  vibe-connect-server:
    image: ghcr.io/kisaesdevlab/vibe-connect-server:${APP_TAG:-latest}
    container_name: vibe-connect-server
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-connect.env
    networks:
      vibe_net: {}
      vibe-connect-internal:
        aliases: [app]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Per-firm uploaded attachments + portal/staff files. Persist across
      # container recreates.
      - /opt/vibe/data/apps/vibe-connect/uploads:/var/lib/vibe/connect/uploads
      # In-app ACME ticker writes here when TLS_MODE=internal. We use
      # TLS_MODE=external (Caddy in front) so this stays empty, but the
      # path must exist or the writer panics on boot.
      - /opt/vibe/data/apps/vibe-connect/tls:/var/lib/vibe/connect/tls
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-connect-client:
    image: ghcr.io/kisaesdevlab/vibe-connect-client:${APP_TAG:-latest}
    container_name: vibe-connect-client
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-connect.env
    networks:
      vibe_net: {}
      vibe-connect-internal: {}
    depends_on:
      vibe-connect-server:
        condition: service_healthy

networks:
  vibe-connect-internal:
    name: vibe-connect-internal
    driver: bridge
