# apps/vibe-glm-ocr.yml — Vibe GLM-OCR overlay.
#
# Single self-contained image — no Ollama sidecar (the upstream
# Dockerfile bundles its own VLM pipeline; an external Ollama
# would shadow whatever the image already does).
#
# The image listens on :8090 and exposes /health. No database; uses
# Redis (db 5) for the OCR job queue.

name: vibe

services:
  vibe-glm-ocr:
    image: ghcr.io/kisaesdevlab/vibe-glm-ocr:${APP_TAG:-latest}
    container_name: vibe-glm-ocr
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-glm-ocr.env
    networks:
      - vibe_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      # OCR cache — model weights / temp scan artefacts. Standardized
      # under /opt/vibe/data/apps/<slug>/ so the appliance's data tree
      # is uniform per app (matches vibe-mybooks/vibe-payroll/etc.).
      - /opt/vibe/data/apps/vibe-glm-ocr/cache:/app/cache
