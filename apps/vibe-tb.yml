# apps/vibe-tb.yml — Vibe Trial Balance overlay.
#
# Used as a docker-compose overlay on top of the core docker-compose.yml.
# enable-app.sh and disable-app.sh invoke compose like:
#
#   docker compose -f docker-compose.yml -f apps/vibe-tb.yml up -d
#   docker compose -f docker-compose.yml -f apps/vibe-tb.yml stop
#
# Reads /opt/vibe/env/vibe-tb.env (rendered from
# env-templates/per-app/vibe-tb.env.tmpl). Joins vibe_net so Caddy can
# reverse-proxy by service name.
#
# Image tags are pinned via VIBE_TB_TAG (default 'latest', set in
# /opt/vibe/env/vibe-tb.env). Change the tag and re-run enable-app.sh
# to upgrade — Phase 7 will add the proper rolling-update flow.

name: vibe

services:
  vibe-tb-server:
    image: ghcr.io/kisaesdevlab/vibe-tb-server:${VIBE_TB_TAG:-latest}
    container_name: vibe-tb-server
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-tb.env
    networks:
      - vibe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Vibe-TB health endpoint per the manifest (manifest.health).
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-tb-client:
    image: ghcr.io/kisaesdevlab/vibe-tb-client:${VIBE_TB_TAG:-latest}
    container_name: vibe-tb-client
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-tb.env
    networks:
      - vibe_net
    depends_on:
      vibe-tb-server:
        condition: service_healthy
    # Client tier is a static-asset web server (nginx-style). No
    # explicit healthcheck — the image's own readiness is verified by
    # the upstream Caddy probe to /.
