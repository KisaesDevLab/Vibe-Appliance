# apps/vibe-tb.yml — Vibe Trial Balance overlay.
#
# Used as a docker-compose overlay on top of the core docker-compose.yml.
# enable-app.sh and disable-app.sh invoke compose like:
#
#   docker compose -f docker-compose.yml -f apps/vibe-tb.yml up -d
#   docker compose -f docker-compose.yml -f apps/vibe-tb.yml stop
#
# Reads /opt/vibe/env/vibe-tb.env (rendered from
# env-templates/per-app/vibe-tb.env.tmpl).
#
# Network topology: each Vibe app sits on TWO networks.
#
#   - vibe_net (shared)         — Caddy reaches every app's services by
#                                  their slug-prefixed names. Postgres
#                                  and Redis live here too.
#   - vibe-tb-internal (private) — the web tier's baked-in nginx config
#                                  has `proxy_pass http://api:<port>`
#                                  literally; nginx refuses to start
#                                  if `api` doesn't resolve. We give
#                                  the server tier an `api` network
#                                  alias on this private network so
#                                  the lookup succeeds without
#                                  colliding with other apps' webs
#                                  that ALSO expect `api` to mean
#                                  THEIR own backend.

name: vibe

services:
  vibe-tb-server:
    image: ghcr.io/kisaesdevlab/vibe-tb-server:${APP_TAG:-latest}
    container_name: vibe-tb-server
    restart: unless-stopped
    init: true
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-tb.env
    networks:
      vibe_net: {}
      vibe-tb-internal:
        aliases: [api]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vibe-tb-client:
    image: ghcr.io/kisaesdevlab/vibe-tb-client:${APP_TAG:-latest}
    container_name: vibe-tb-client
    restart: unless-stopped
    env_file:
      - /opt/vibe/env/shared.env
      - /opt/vibe/env/vibe-tb.env
    networks:
      vibe_net: {}
      vibe-tb-internal: {}
    depends_on:
      vibe-tb-server:
        condition: service_healthy

networks:
  vibe-tb-internal:
    name: vibe-tb-internal
    driver: bridge
