# caddy/snippets/tailscale.conf — global block content for --mode tailscale.
#
# Tailscale mode terminates TLS via `tailscale serve`, not Caddy, so the
# global block stays empty. Caddy's job in tailscale mode is to listen on
# 127.0.0.1 only and let tailscaled route public traffic.
