# caddy/snippets/domain.conf — global block content for --mode domain.
#
# Inserted into the rendered Caddyfile at @VIBE_GLOBAL_SNIPPET@ when
# state.json's mode == "domain". Provides the ACME contact email; Caddy
# then issues per-subdomain certs via HTTP-01 automatically (port 80
# must be inbound-reachable from the internet during issuance and the
# 60-day renewal window).
#
# Variables filled by lib/render-caddyfile.sh from state.json:
#   @VIBE_ACME_EMAIL@        — config.email
#
# DNS-01 wildcard certs (Cloudflare): see caddy/Dockerfile.cloudflare
# for the opt-in custom build. After building that image and pointing
# docker-compose.yml's caddy service at it, append the directive
#   acme_dns cloudflare {env.CLOUDFLARE_API_TOKEN}
# below the email line and reload Caddy.

	email @VIBE_ACME_EMAIL@
