# caddy/snippets/domain.conf — global block content for --mode domain.
#
# Inserted into the rendered Caddyfile at @VIBE_GLOBAL_SNIPPET@ when
# state.json's mode == "domain". Provides the ACME contact email plus
# (when CLOUDFLARE_API_TOKEN is set) the DNS-01 wildcard cert path.
#
# Phase 2 status: skeleton. Real cert issuance lands in Phase 3 once
# Vibe-TB integration goes live.
#
# Variables filled by lib/render-caddyfile.sh from state.json:
#   @VIBE_ACME_EMAIL@        — config.email
#
# (Cloudflare DNS-01 wiring requires a custom Caddy build with the
# cloudflare DNS plugin. We'll switch the image in Phase 3 when this
# snippet is wired in.)

	email @VIBE_ACME_EMAIL@

	# Phase 3 will add:
	#   acme_dns cloudflare {env.CLOUDFLARE_API_TOKEN}
	# when state.config.cloudflare_token_present is true.
