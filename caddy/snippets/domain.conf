# caddy/snippets/domain.conf — global block content for --mode domain.
#
# Inserted into the rendered Caddyfile's global block when state.json's
# mode == "domain". Provides the ACME contact email; Caddy then issues
# per-subdomain certs via HTTP-01 automatically (port 80 must be
# inbound-reachable from the internet during issuance and the 60-day
# renewal window).
#
# The acme-email below is the only substituted value; do not reference
# placeholder tokens verbatim in these comments — the renderer does
# global text substitution, which would corrupt the comment AND the
# substituted line if the value contained newlines or special chars.
#
# DNS-01 wildcard certs (Cloudflare): see caddy/Dockerfile.cloudflare
# for the opt-in custom build. After building that image and pointing
# docker-compose.yml's caddy service at it, append the directive
#   acme_dns cloudflare {env.CLOUDFLARE_API_TOKEN}
# below the email line and reload Caddy.

	email @VIBE_ACME_EMAIL@
